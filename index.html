<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى ما في حياتي.. أنا آسف ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --rose-deep: #b5173a;
            --rose-mid: #e63262;
            --rose-soft: #ff7096;
            --rose-pale: #ffd6e0;
            --rose-blush: #fff0f3;
            --gold: #d4a847;
            --cream: #fffaf4;
            --dark-text: #3b0a18;
            --mid-text: #7a2232;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cream);
            font-family: 'Tajawal', sans-serif;
            color: var(--dark-text);
            overflow-x: hidden;
        }

        /* ===== LOCK SCREEN ===== */
        #lockScreen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 60% 40%, #ffd6e0 0%, #ffb3c6 40%, #e63262 100%);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lock-petals {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .petal {
            position: absolute;
            font-size: 1.4rem;
            animation: petalFall linear infinite;
            opacity: 0.5;
        }

        @keyframes petalFall {
            0%  { transform: translateY(-5vh) rotate(0deg); opacity: 0.6; }
            100%{ transform: translateY(110vh) rotate(400deg); opacity: 0; }
        }

        .lock-box {
            position: relative;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(182, 23, 58, 0.25), 0 0 0 1px rgba(255,255,255,0.6) inset;
            text-align: center;
            max-width: 420px;
            width: 92%;
            animation: boxFloat 4s ease-in-out infinite;
        }

        @keyframes boxFloat {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .lock-icon {
            font-size: 3.5rem;
            margin-bottom: 18px;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50%      { transform: scale(1.12); }
        }

        .lock-box h2 {
            font-family: 'Amiri', serif;
            font-size: 1.7rem;
            color: var(--rose-deep);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .lock-box p {
            color: var(--mid-text);
            font-size: 1.05rem;
            margin-bottom: 28px;
            line-height: 1.7;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 18px;
        }

        .lock-box input {
            width: 100%;
            padding: 14px 22px;
            border: 2px solid var(--rose-pale);
            border-radius: 50px;
            font-size: 1.15rem;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            outline: none;
            background: var(--rose-blush);
            color: var(--dark-text);
            transition: border-color 0.3s, box-shadow 0.3s;
            letter-spacing: 4px;
        }

        .lock-box input:focus {
            border-color: var(--rose-mid);
            box-shadow: 0 0 0 4px rgba(230,50,98,0.12);
        }

        .unlock-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.15rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(182,23,58,0.3);
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(182,23,58,0.4);
        }

        #errorMessage {
            color: var(--rose-deep);
            margin-top: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            display: none;
        }

        /* ===== HEARTS RAIN ===== */
        .heart {
            position: fixed;
            top: -8vh;
            pointer-events: none;
            z-index: 500;
            animation: heartFall linear forwards;
        }

        @keyframes heartFall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 24px 40px;
            background: var(--cream);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--rose-pale), var(--rose-mid), var(--gold), var(--rose-mid), var(--rose-pale));
        }

        .eyebrow {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: var(--rose-soft);
            font-weight: 700;
            margin-bottom: 22px;
        }

            font-family: 'Amiri', serif;
            font-size: clamp(2rem, 5vw, 3.4rem);
            color
