<html lang="ar" dir="rtl">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffb3c6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            color: #4a0e17;
            text-align: center;
        }

        /* شاشة طلب الباسورد */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ffb3c6, #ffe5ec);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s ease-in-out;
        }

        .lock-box {
            background: white;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(201, 24, 74, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .lock-box h2 {
            color: #c9184a;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        .lock-box p {
            color: #7a2232;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .lock-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ffb3c6;
            border-radius: 50px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .lock-box input:focus {
            border-color: #c9184a;
        }

        .lock-box button {
            background: #c9184a;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        .lock-box button:hover {
            background: #ff4d6d;
            transform: scale(1.05);
        }

        #errorMessage {
            color: #d90429;
            margin-top: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            display: none;
        }

        /* باقي ستايل الموقع */
        .heart {
            position: fixed;
            top: -10vh;
            font-size: 20px;
            color: #ff4d6d;
            z-index: 999;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) translateX(20px) rotate(360deg); }
        }

        header {
            padding: 60px 20px 30px 20px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 2.8rem;
            color: #c9184a;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .love-text {
            font-size: 1.35rem;
            max-width: 700px;
            margin: 20px auto;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 2.5s ease-in-out forwards;
            animation-delay: 0.5s;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 40px 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .photo-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 320px;
        }

        .photo-card.visible {
            transform: scale(1);
            opacity: 1;
        }
