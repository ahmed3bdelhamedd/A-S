<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا آسف.. ❤️</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #fffaf4; }
        
        /* شاشة القفل */
        #lockScreen {
            position: fixed; inset: 0; z-index: 9999;
            background: #e63262;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        
        /* إخفاء المحتوى الرئيسي تماماً في البداية */
        #mainContent { display: none; padding: 20px; }
        
        input { padding: 15px; border-radius: 20px; border: none; margin: 10px; width: 80%; max-width: 300px; text-align: center; font-size: 18px; }
        button { padding: 15px 30px; border-radius: 20px; border: none; cursor: pointer; background: #ffd6e0; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #ff7096; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <h1>يا أغلى الناس.. سامحيني</h1>
        <input type="text" id="passwordInput" placeholder="كلمة السر">
        <button onclick="checkPassword()">افتحي قلبي</button>
        <p id="error" style="display:none; color: yellow; margin-top: 10px;">الباسورد غلط، ركز يا أحمد!</p>
    </div>

    <div id="mainContent">
        <h1>أنا آسف يا قلبي.. ❤️</h1>
        <p>مقدرش على زعلك، الدنيا بتبقى وحشة أوي وانتي مش راضية عني.</p>
        <p>بحبك يا صفيّة.</p>
    </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById('passwordInput').value.toLowerCase().trim();
            var lock = document.getElementById('lockScreen');
            var main = document.getElementById('mainContent');
            var err = document.getElementById('error');

            if (pass === "ahmedxxsafia") {
                lock.style.display = 'none';
                main.style.display = 'block';
            } else {
                err.style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }
    </script>
</body>
</html>
